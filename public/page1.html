<!DOCTYPE html>
<html lang="en">
<head>
<title>Student Details</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(270deg, #ff9a9e, #fad0c4, #ffecd2, #fcb69f);
        background-size: 800% 800%;
        animation: gradientMove 15s ease infinite;
    }
    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: inherit;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 12px;
        animation: fadeOut 3s forwards;
        animation-delay: 2s;
        z-index: 1000;
    }
    @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
    }

    .loader-text {
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        animation: fadeInText 1.0s ease-in-out infinite alternate;
    }
    @keyframes fadeInText {
        from { opacity: 0.5; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1.05); }
    }

    .container {
        max-width: 320px;
        margin: 80px auto;
        padding: 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        opacity: 0;
        animation: showForm 1s forwards;
        animation-delay: 3s;
    }
    @keyframes showForm {
        to { opacity: 1; }
    }
    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }
    input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
            font-size: 14px;
            background: white;
            height: 40px;
            box-sizing: border-box;
            appearance: none;
        }
        select {
            padding-right: 30px;
            background-image: url("data:image/svg+xml,%3Csvg fill='black' height='16' viewBox='0 0 24 24' width='16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }
    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: linear-gradient(135deg, #ff7e5f, #feb47b);
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }
    button:hover {
        opacity: 0.9;
    }
</style>
</head>
<body>

<div class="loader-wrapper">
    <div style="text-align:center; margin-bottom:8px;"><img src="/logo.jpg" alt="App Logo" style="height:48px; object-fit:contain;"></div>
    <div class="loader-text">Let's examine yourself!</div>
</div>

<div class="container">
    <h2>🎓 Student Details</h2>
    <form action="/page2.html" method="get">
        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <label>Branch:</label>
        <select name="branch" required>
            <option value="">-- Select Branch --</option>
            <option value="CSE">CSE</option>
            <option value="AIDS">AIDS</option>
            <option value="AIML">AIML</option>
            <option value="MCA">MCA</option>
        </select>

        <label>Year:</label>
        <input type="text" name="year" placeholder="Enter your year" required>

        

        <button type="submit">🚀 Submit</button>
    </form>
</div>

</body>
</html>
