<html>
<head>
<title>Quiz Result</title>
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }
    .result-container {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        backdrop-filter: blur(10px);
        animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    h1 {
        margin-bottom: 10px;
        font-size: 2rem;
        color: #ffd700;
    }
    .score {
        background: rgba(255, 255, 255, 0.15);
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 15px;
        font-size: 1.2rem;
    }
    .thumb {
        font-size: 3rem;
        margin-top: 20px;
        animation: bounce 1s infinite;
    }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }
</style>
</head>
<body>

<div class="result-container">
    <h1>🎯 Quiz Result</h1>
    <div class="score">Marks Obtained: <strong>8</strong></div>
    <div class="score">Total Solved: <strong>8</strong></div>
    <div class="score">Unsolved: <strong>2</strong></div>
    <p style="font-size: 1.1rem; margin-top: 10px;">Keep going, you’re doing great!</p>
    <div class="thumb">👍</div>
</div>

</body>
</html>
